# Continuous integration for the Kloppy desktop app.
#
# Fast gate on every push / PR to the mainline branches: install, run the unit
# tests, and syntax-check every source file. No packaging here — that lives in
# release.yml and only runs on version tags.
name: CI

on:
  push:
    branches: [main, release/v0.1.0]
  pull_request:
    branches: [main, release/v0.1.0]

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

jobs:
  test:
    name: Test & syntax check
    runs-on: ubuntu-latest
    # The Electron app lives in a subdirectory; run every `npm` step there.
    defaults:
      run:
        working-directory: kloppy-desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          # package-lock.json is not at the repo root — point the cache at it.
          cache-dependency-path: kloppy-desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Syntax check
        run: npm run check
