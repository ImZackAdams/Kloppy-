<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kloppy!</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="summon-window">

  <!-- Same CSS-only gremlin as the main window, just popping in to comment -->
  <div class="kloppy-zone">
    <div class="kloppy" aria-hidden="true">
      <div class="antenna antenna-left"></div>
      <div class="antenna antenna-right"></div>
      <div class="head">
        <div class="screen">
          <div class="eye eye-left"></div>
          <div class="eye eye-right"></div>
          <div class="mouth"></div>
        </div>
      </div>
      <div class="leg leg-left"></div>
      <div class="leg leg-right"></div>
    </div>
    <div class="bubble">
      <p id="bubble-text">Kloppy has appeared.</p>
    </div>
  </div>

  <button id="dismiss" type="button">Go away, Kloppy</button>

  <script src="popup.js"></script>
</body>
</html>
